name: Build AppDataKit TIPA

on:
  push:
    branches: [ main ]
    tags:     [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build (Theos)
    runs-on: macos-14
    env:
      THEOS: ${{ github.workspace }}/theos

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Xcode CLT (cached on runner)
        run: |
          xcode-select -p
          xcrun --sdk iphoneos --show-sdk-path || true

      - name: Cache Theos
        id: cache-theos
        uses: actions/cache@v4
        with:
          path: ${{ env.THEOS }}
          key: theos-${{ runner.os }}-sdk16_5-v2

      - name: Install Theos + iOS 16.5 SDK
        if: steps.cache-theos.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          git clone --recursive https://github.com/theos/theos.git "$THEOS"
          mkdir -p "$THEOS/sdks"

          # The theos/sdks repo stores SDKs as plain directories in the tree.
          # Download a tarball of the master branch and move only the 16.5 SDK
          # into Theos's sdks folder.
          TMP="$(mktemp -d)"
          curl -L --fail \
            -o "$TMP/sdks.tar.gz" \
            https://codeload.github.com/theos/sdks/tar.gz/refs/heads/master
          echo "Downloaded $(wc -c < "$TMP/sdks.tar.gz") bytes"
          tar -xzf "$TMP/sdks.tar.gz" -C "$TMP"
          if [ ! -d "$TMP/sdks-master/iPhoneOS16.5.sdk" ]; then
            echo "iPhoneOS16.5.sdk not present in theos/sdks master — falling back to latest 16.x"
            FALLBACK="$(ls -d "$TMP"/sdks-master/iPhoneOS16.*.sdk 2>/dev/null | sort -V | tail -n1)"
            echo "Using fallback: $FALLBACK"
            mv "$FALLBACK" "$THEOS/sdks/"
          else
            mv "$TMP/sdks-master/iPhoneOS16.5.sdk" "$THEOS/sdks/"
          fi
          rm -rf "$TMP"
          echo "Installed SDKs:"
          ls -1 "$THEOS/sdks"

      - name: Install ldid + dpkg
        run: |
          brew install ldid dpkg make
          echo "/opt/homebrew/opt/make/libexec/gnubin" >> $GITHUB_PATH

      - name: Build (.deb)
        run: |
          make clean
          make package FINALPACKAGE=1 -j"$(sysctl -n hw.ncpu)"

      - name: Package as .tipa
        run: |
          DEB=$(ls -t packages/*.deb | head -n1)
          echo "Source deb: $DEB"
          TMP=$(mktemp -d)
          dpkg-deb -R "$DEB" "$TMP"
          mkdir -p "$TMP/Payload"
          # The Application target installs under /Applications inside the deb.
          cp -R "$TMP/Applications/AppDataKit.app" "$TMP/Payload/"
          (cd "$TMP" && zip -qr "$PWD/AppDataKit.tipa" Payload)
          cp "$TMP/AppDataKit.tipa" packages/
          ls -lh packages/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: AppDataKit-tipa
          path: |
            packages/*.tipa
            packages/*.deb
          retention-days: 30

      - name: Release (on tag push)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            packages/*.tipa
            packages/*.deb
          generate_release_notes: true
