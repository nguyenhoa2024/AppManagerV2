name: Build AppDataKit TIPA

on:
  push:
    branches: [ main ]
    tags:     [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build (Theos)
    runs-on: macos-14
    env:
      THEOS: ${{ github.workspace }}/theos

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Xcode CLT (cached on runner)
        run: |
          xcode-select -p
          xcrun --sdk iphoneos --show-sdk-path || true

      - name: Cache Theos
        id: cache-theos
        uses: actions/cache@v4
        with:
          path: ${{ env.THEOS }}
          key: theos-${{ runner.os }}-v1

      - name: Install Theos
        if: steps.cache-theos.outputs.cache-hit != 'true'
        run: |
          git clone --recursive https://github.com/theos/theos.git "$THEOS"
          # Pull the iOS 16.5 patched SDK (commonly used in community builds).
          mkdir -p "$THEOS/sdks"
          curl -L -o iPhoneOS16.5.sdk.tar.xz \
            https://github.com/theos/sdks/releases/download/master/iPhoneOS16.5.sdk.tar.xz
          tar -xf iPhoneOS16.5.sdk.tar.xz -C "$THEOS/sdks"
          rm iPhoneOS16.5.sdk.tar.xz

      - name: Install ldid + dpkg
        run: |
          brew install ldid dpkg make
          echo "/opt/homebrew/opt/make/libexec/gnubin" >> $GITHUB_PATH

      - name: Build (.deb)
        run: |
          make clean
          make package FINALPACKAGE=1 -j"$(sysctl -n hw.ncpu)"

      - name: Package as .tipa
        run: |
          DEB=$(ls -t packages/*.deb | head -n1)
          echo "Source deb: $DEB"
          TMP=$(mktemp -d)
          dpkg-deb -R "$DEB" "$TMP"
          mkdir -p "$TMP/Payload"
          # The Application target installs under /Applications inside the deb.
          cp -R "$TMP/Applications/AppDataKit.app" "$TMP/Payload/"
          (cd "$TMP" && zip -qr "$PWD/AppDataKit.tipa" Payload)
          cp "$TMP/AppDataKit.tipa" packages/
          ls -lh packages/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: AppDataKit-tipa
          path: |
            packages/*.tipa
            packages/*.deb
          retention-days: 30

      - name: Release (on tag push)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            packages/*.tipa
            packages/*.deb
          generate_release_notes: true
